spring.application.name=agromag

# Supabase Database (credenciales desde .env via spring-dotenv)
spring.datasource.url=${SUPABASE_JDBC_URL}&prepareThreshold=0
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=always

# Supabase Auth - validación JWT
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://${SUPABASE_PROJECT_REF}.supabase.co/auth/v1/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# Open-Meteo (ClimateService)
openmeteo.url=https://api.open-meteo.com/v1/forecast

# Spring AI — OpenRouter (proxy compatible con OpenAI)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=deepseek/deepseek-v4-flash:free
spring.ai.openai.chat.options.temperature=0.3

# Seed data
spring.jpa.defer-datasource-initialization=true

# Seguridad de errores — NO exponer detalles internos
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never

logging.file.name=spring.log

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false

# Umbrales de los motores de reglas de recomendación

# Temperatura (°C) a partir de la cual se activa alerta fitosanitaria
agromag.recommendation.phyto-temp-threshold=28

# Humedad relativa (%) a partir de la cual se activa alerta fitosanitaria
agromag.recommendation.phyto-humidity-threshold=80

# Delta (°C) respecto a la temp. máxima óptima para considerar riego preventivo
# Ej: si maxTemp = 32 y delta = 3, a partir de 29°C se sugiere riego
agromag.recommendation.irrigation-near-max-delta=3

# Semanas desde la siembra para considerar etapa inicial (germinación)
agromag.recommendation.fertilizer-initial-stage-weeks=4

# Semanas desde la siembra hasta fin de etapa vegetativa (>= este valor → producción)
agromag.recommendation.fertilizer-vegetative-stage-weeks=12

# Scheduling de alertas automaticas
spring.task.scheduling.pool-size=3

# Cache de contexto para asistente IA
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m
